## в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
## в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# mira https://wiki.hypr.land/configuring/keywords/ para mГЎs informaciГіn
# para ver ejemplos de atajos, mira https://wiki.hypr.land/configuring/binds/

#? ------- COMPATIBLE CON KEYBINDS_HYPRLAND_V_0_53 ----------------
#   Esta configuraciГіn es compatible con los cambios de atajos en Hyprland v0.53+
#   Para asegurar que tu sistema funcione, no deshabilitaremos este bloque
#   Los archivos de plantilla del usuario se proporcionarГЎn en $XDG_DATA_HOME/hyde/templates/hypr/keybindings.conf para actualizaciГіn manual.

#? ------- AgrupaciГіn de atajos para una gestiГіn mГЎs fГЎcil ----------------
#  $d=[Nombre del Grupo|Nombre del Subgrupo1|Nombre del Subgrupo2|...]
# '$d' es una variable que se utiliza para agrupar atajos (o usar otra variable)
# Esto es solo para fines de organizaciГіn y no es una variable definida por hyprland
# Lo que hicimos aquГӯ fue modificar la DescripciГіn de los atajos para incluir el nombre del grupo
# El $d serГЎ analizado como una clave separada para usarse en una GUI (interfaz grГЎfica) o algo visual
# [Principal|Subgrupo1|Subgrupo2|...]
# Principal - El nombre del grupo principal
# Subgrupo1.. - Los nombres de los subgrupos se pueden usar para evitar repetir la misma descripciГіn

#? ------- Variables ----------------
# Por defecto si estГЎ comentado
# $mainMod = Super # tecla super / meta / windows
# Asignar aplicaciones
# $TERMINAL = kitty
# $EDITOR = code
# $EXPLORER = dolphin
# $BROWSER = firefox
# $KILLACTIVE = hyprctl dispatch killactive ""
$DISCORD = flatpak run io.github.spacingbat3.webcord

$wm=Window Management
$d=[$wm]
# Cierra la ventana que tienes actualmente enfocada.
bindd = $mainMod, Q, $d cerrar ventana enfocada, exec, $KILLACTIVE
# Atajo alternativo (clГЎsico de Windows) para cerrar la ventana enfocada.
bindd = Alt, F4, $d cerrar ventana enfocada, exec, $KILLACTIVE
# Cierra tu sesiГіn actual de Hyprland (regresa al login).
bindd = $mainMod Shift, Delete, $d cerrar sesion hyprland, exec, hyde-shell logout
# Cambia la ventana enfocada entre el modo "flotante" y el modo "mosaico" (tiling).
bindd = $mainMod, W, $d alternar modo flotante, togglefloating
# Agrupa o desagrupa ventanas para manejarlas por pestaГұas (tabbed).
bindd = $mainMod, G, $d alternar grupo, togglegroup
# Pone la ventana enfocada en modo pantalla completa.
bindd = Shift, F11, $d alternar pantalla completa, fullscreen
# Bloquea la pantalla de tu computadora.
bindd = $mainMod, L, $d bloquear pantalla, exec, hyde-shell lock-session
# Fija (hace "pin") una ventana flotante para que sea visible en todos los espacios de trabajo.
bindd = $mainMod Shift, F, $d fijar ventana enfocada, exec, hyde-shell window.pin
# Muestra el menГә grГЎfico de apagado, reinicio y cierre de sesiГіn.
bindd = $mainMod, Delete, $d menu de apagado, exec, hyde-shell logoutlaunch
# Oculta temporalmente la barra superior (Waybar) y recarga su configuraciГіn.
bindd = Alt_R, Control_R, $d alternar y recargar waybar, exec, hyde-shell waybar --hide
# bindd = ALT_R, Control_R, alternar waybar, exec, killall waybar || waybar # alterna waybar sin recargar, esto es mГЎs rГЎpido

$d=[$wm|Group Navigation]
# Navega hacia la ventana anterior dentro de un grupo de ventanas (cuando usas $mainMod + G).
bindd = $mainMod Control, H, $d grupo activo anterior, changegroupactive, b
# Navega hacia la ventana siguiente dentro de un grupo de ventanas.
bindd = $mainMod Control, L, $d grupo activo siguiente, changegroupactive, f

$d=[$wm|Change focus]
# Mueve el foco hacia la ventana de la izquierda, derecha, arriba o abajo respectivamente.
bindd = $mainMod, Left, $d enfocar izquierda, movefocus, l
bindd = $mainMod, Right, $d enfocar derecha, movefocus, r
bindd = $mainMod, Up, $d enfocar arriba, movefocus, u
bindd = $mainMod, Down , $d enfocar abajo, movefocus, d
# Cicla el foco entre las ventanas abiertas, similar al Alt+Tab clГЎsico, trayendo la seleccionada al frente.
bindd = ALT, Tab,$d ciclar enfoque, exec, hyprctl --batch "dispatch cyclenext ; dispatch alterzorder top"

$d=[$wm|Resize Active Window]
# Redimensiona la ventana enfocada hacia la derecha, izquierda, arriba o abajo respectivamente.
bindde = $mainMod Shift, Right, $d redimensionar ventana derecha, resizeactive, 30 0
bindde = $mainMod Shift, Left, $d redimensionar ventana izquierda, resizeactive, -30 0
bindde = $mainMod Shift, Up, $d redimensionar ventana arriba, resizeactive, 0 -30
bindde = $mainMod Shift, Down, $d redimensionar ventana abajo, resizeactive, 0 30

# Mueve la ventana activa por el espacio de trabajo actual con mainMod + Shift + Control [вҶҗвҶ’вҶ‘вҶ“]
$d=[$wm|Move active window across workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
# Mueve de lugar la ventana enfocada hacia la izquierda, derecha, arriba o abajo dentro de tu espacio de trabajo.
bindde = $mainMod Shift Control, left, mover ventana activa izquierda, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod Shift Control, right, mover ventana activa derecha, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod Shift Control, up, mover ventana activa arriba, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod Shift Control, down, mover ventana activa abajo, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

# Mover/Redimensionar ventana enfocada
$d=[$wm|Move & Resize with mouse]
# MantГ©n presionada la tecla Modificadora (Super/Windows) y el Clic Izquierdo para arrastrar/mover la ventana con el ratГіn.
binddm = $mainMod, mouse:272, $d mantener para mover ventana, movewindow
# MantГ©n presionada la tecla Modificadora y el Clic Derecho para redimensionar la ventana con el ratГіn.
binddm = $mainMod, mouse:273, $d mantener para redimensionar ventana, resizewindow
# Alternativas con teclado: mantГ©n Modificadora + Z para mover con el ratГіn, o Modificadora + X para redimensionar con el ratГіn.
binddm = $mainMod, Z, $d mantener para mover ventana, movewindow
binddm = $mainMod, X, $d mantener para redimensionar ventana, resizewindow

# Alternar la divisiГіn de la ventana enfocada
$d=[$wm]
# Cambia la direcciГіn en la que se divide la siguiente ventana (horizontal vs vertical).
bindd = $mainMod, J, $d alternar division, layoutmsg, togglesplit

$l=Launcher
$d=[$l|Apps]
# Lanza tu terminal por defecto.
bindd = $mainMod, T, $d emulador de terminal, exec, $TERMINAL
# Abre una terminal desplegable (estilo "Quake") en la parte superior o inferior.
bindd = $mainMod Alt, T, $d terminal desplegable, exec, hyde-shell pypr toggle console
# Lanza el explorador de archivos.
bindd = $mainMod, E, $d explorador de archivos, exec, $EXPLORER
# Lanza el editor de texto/cГіdigo.
bindd = $mainMod, C, $d editor de texto, exec, $EDITOR
# Lanza el navegador web.
bindd = $mainMod, B, $d navegador web, exec, $BROWSER
# Lanza discord (webcord) o cierra la ventana si ya estГЎ en foco
bindd = $mainMod, D, $d discord, exec, bash -c 'if hyprctl activewindow -j | jq -r .class | grep -iq "webcord"; then hyprctl dispatch killactive ""; else flatpak run io.github.spacingbat3.webcord; fi'
# Mata el proceso de discord por completo (cierra la aplicaciГіn de raГӯz)
bindd = $mainMod Shift, D, $d cerrar discord, exec, flatpak kill io.github.spacingbat3.webcord
# Lanza Steam o cierra la ventana
bindd = $mainMod Control_L, S, $d steam, exec, bash -c 'if hyprctl activewindow -j | jq -r .class | grep -iq "steam"; then hyprctl dispatch killactive ""; else steam; fi'
# Mata el proceso de steam por completo
bindd = $mainMod Shift Control_L, S, $d cerrar steam, exec, pkill -9 -f steam
# Lanza el monitor del sistema (administrador de tareas).
bindd = $mainMod, Escape, $d monitor del sistema, exec, hyde-shell system.monitor
# Lanza el monitor btop.
bindd = $mainMod Alt, Escape, $d abrir btop, exec, $TERMINAL -e btop
# Lanza el monitor nvtop.
bindd = $mainMod Shift, Escape, $d abrir nvtop, exec, $TERMINAL -e nvtop

$d=[$l|Rofi menus]
$rofi-launch=hyde-shell rofilaunch
# Lanza el menГә principal de bГәsqueda de aplicaciones (Rofi).
bindd = $mainMod, A, $d buscador de aplicaciones, exec, pkill -x rofi || $rofi-launch d
# Lanza el selector para cambiar entre ventanas que ya tienes abiertas.
bindd = $mainMod, TAB, $d intercambiador de ventanas, exec, pkill -x rofi || $rofi-launch w
# Abre un buscador de archivos integrado en Rofi.
bindd = $mainMod Shift, E, $d buscador de archivos, exec, pkill -x rofi || $rofi-launch f
# Muestra una hoja de cheat/ayuda con todos los atajos de teclado.
bindd = $mainMod, minus, $d pista de atajos, exec, pkill -x rofi || hyde-shell keybinds_hint c
# Abre un selector para copiar Emojis al portapapeles.
bindd = $mainMod, comma, $d selector de emojis, exec, pkill -x rofi || hyde-shell emoji-picker
# Abre un selector de caracteres especiales y glifos.
bindd = $mainMod, period, $d selector de glifos, exec, pkill -x rofi || hyde-shell glyph-picker
# Abre el historial de tu portapapeles para pegar cosas que copiaste antes.
bindd = $mainMod, V, $d portapapeles,  exec, pkill -x rofi || hyde-shell cliphist -c
# Abre el administrador completo del portapapeles.
bindd = $mainMod Shift, V, $d administrador del portapapeles, exec, pkill -x rofi || hyde-shell cliphist
# Abre un menГә para cambiar el estilo visual de los menГәs Rofi.
bindd = $mainMod Shift, A, $d seleccionar lanzador rofi, exec, pkill -x rofi || hyde-shell rofiselect

$hc=Hardware Controls
$d=[$hc|Audio]
# Activa o desactiva el sonido general (Mute).
binddl  = , F10, $d alternar silencio de salida, exec, hyde-shell volumecontrol -o m
binddl  = , XF86AudioMute,$d alternar silencio de salida, exec, hyde-shell volumecontrol -o m
# Baja el volumen general.
binddel = , F11, $d bajar volumen, exec, hyde-shell volumecontrol -o d
# Sube el volumen general.
binddel = , F12, $d subir volumen, exec, hyde-shell volumecontrol -o i
# Activa o desactiva el micrГіfono (Mute).
binddl  = , XF86AudioMicMute,$d alternar silencio de microfono, exec, hyde-shell volumecontrol -i m
# Controles de volumen y brillo usando las teclas multimedia dedicadas del teclado.
binddel = , XF86AudioLowerVolume, $d bajar volumen, exec, hyde-shell volumecontrol -o d
binddel = , XF86AudioRaiseVolume, $d subir volumen, exec, hyde-shell volumecontrol -o i

$d=[$hc|Media]
# Reproduce o pausa la mГәsica / video actual.
binddl  = , XF86AudioPlay,$d reproducir o pausar multimedia, exec, playerctl play-pause
binddl  = , XF86AudioPause,$d pausar multimedia, exec, playerctl play-pause
# Salta a la siguiente pista.
binddl  = , XF86AudioNext,$d multimedia siguiente, exec, playerctl next
# Regresa a la pista anterior.
binddl  = , XF86AudioPrev,$d multimedia anterior, exec, playerctl previous
# Silencia Гәnicamente el audio de la ventana que estГЎs usando actualmente (Гәtil para callar navegadores o juegos).
bindd = $mainMod Control, M, $d alternar silencio en ventana activa, exec, hyde-shell window.mute

$d=[$hc|Brightness]
# Aumenta el brillo de la pantalla.
binddel = , XF86MonBrightnessUp, $d subir brillo, exec, hyde-shell brightnesscontrol i
# Disminuye el brillo de la pantalla.
binddel = , XF86MonBrightnessDown, $d bajar brillo, exec, hyde-shell brightnesscontrol d

$ut=Utilities
$d=[$ut]
# Cambia la distribuciГіn/idioma del teclado.
binddl = $mainMod, K, $d cambiar distribucion de teclado, exec, hyde-shell keyboardswitch
# Activa el "Modo Juego" (desactiva animaciones y decoraciones para mejorar rendimiento mientras juegas).
bindd = $mainMod Alt, G, $d modo juego, exec, hyde-shell gamemode
# Lanza un menГә optimizado para abrir juegos de Steam, Lutris, etc.
bindd = $mainMod Shift, G, $d abrir lanzador de juegos, exec, hyde-shell gamelauncher

$d=[$ut|Screen Capture]
# Selector de color: te permite hacer clic en cualquier lugar de la pantalla para copiar el cГіdigo de color HEX.
bindd = $mainMod Shift, P, $d selector de color, exec, hyprpicker -an
# Herramienta de recortes: seleccionas un ГЎrea para tomarle captura de pantalla.
bindd = $mainMod, P, $d recortar pantalla, exec, hyde-shell screenshot s
# Congela la pantalla temporalmente para que puedas recortar un ГЎrea con precisiГіn sin que la imagen cambie.
bindd = $mainMod Control, P, $d congelar y recortar pantalla, exec, hyde-shell screenshot sf
# Toma una captura de todo el monitor actual donde estГЎ tu ratГіn.
binddl = $mainMod Alt, P, $d capturar monitor, exec, hyde-shell screenshot m
# Toma una captura de todos tus monitores al mismo tiempo.
binddl = , Print, $d capturar todos los monitores, exec, hyde-shell screenshot p

# TODO Hacer un menГә rofi principal para estos selectores
$rice=Theming and Wallpaper
$d=[$rice]
# Cambia al fondo de pantalla global siguiente o anterior de tu carpeta/sistema.
bindd = $mainMod Alt, Right, $d siguiente fondo global, exec, hyde-shell wallpaper -Gn
bindd = $mainMod Alt, Left, $d anterior fondo global, exec, hyde-shell wallpaper -Gp
# Abre un menГә para que selecciones manualmente el fondo de pantalla que quieres.
bindd = $mainMod Shift, W, $d seleccionar fondo global, exec, pkill -x rofi || hyde-shell wallpaper -SG
# Cambia al estilo/diseГұo siguiente o anterior de la barra superior de Waybar.
bindd = $mainMod Alt, Up, $d siguiente diseГұo waybar, exec, hyde-shell wbarconfgen n
bindd = $mainMod Alt, Down, $d anterior diseГұo waybar, exec, hyde-shell wbarconfgen p
# Abre el selector de 'Wallbash' para generar colores de la interfaz a partir del fondo de pantalla.
bindd = $mainMod Shift, R, $d selector de modo wallbash, exec, pkill -x rofi || hyde-shell wallbashtoggle -m
# Abre el selector para cambiar el tema visual general.
bindd = $mainMod Shift, T, $d seleccionar tema, exec, pkill -x rofi || hyde-shell themeselect
# Abre un menГә para cambiar los estilos de animaciones de las ventanas.
bindd = $mainMod+Shift, Y, $d seleccionar animaciones, exec, pkill -x rofi || hyde-shell animations --select
# Abre el selector para elegir cГіmo se ve tu pantalla de bloqueo.
bindd = $mainMod+Shift, U, $d seleccionar diseГұo hyprlock, exec, pkill -x rofi || hyde-shell hyprlock --select

$ws=Workspaces
$d=[$ws|Navigation]
# Te lleva directamente a los espacios de trabajo del 1 al 10.
bindd = $mainMod, 1, $d navegar al espacio 1, workspace, 1
bindd = $mainMod, 2, $d navegar al espacio 2, workspace, 2
bindd = $mainMod, 3, $d navegar al espacio 3, workspace, 3
bindd = $mainMod, 4, $d navegar al espacio 4, workspace, 4
bindd = $mainMod, 5, $d navegar al espacio 5, workspace, 5
bindd = $mainMod, 6, $d navegar al espacio 6, workspace, 6
bindd = $mainMod, 7, $d navegar al espacio 7, workspace, 7
bindd = $mainMod, 8, $d navegar al espacio 8, workspace, 8
bindd = $mainMod, 9, $d navegar al espacio 9, workspace, 9
bindd = $mainMod, 0, $d navegar al espacio 10, workspace, 10

$d=[$ws|Navigation|Relative workspace]
# Te mueve al espacio de trabajo siguiente o anterior basado en los que estГЎn activos.
bindd = $mainMod Control, Right, $d espacio activo siguiente, workspace, r+1
bindd = $mainMod Control, Left, $d espacio activo anterior, workspace, r-1

$d=[$ws|Navigation]
# Te mueve rГЎpidamente al primer espacio de trabajo que estГ© vacГӯo.
bindd = $mainMod Control, Down, $d navegar al espacio vacio mas cercano, workspace, empty

# Mover la ventana enfocada a un espacio de trabajo
$d=[$ws|Move window to workspace]
# Mueve la ventana que estГЎs usando a un espacio de trabajo del 1 al 10 y te lleva a Г©l.
bindd = $mainMod Shift, 1, $d mover al espacio 1, movetoworkspace, 1
bindd = $mainMod Shift, 2, $d mover al espacio 2, movetoworkspace, 2
bindd = $mainMod Shift, 3, $d mover al espacio 3, movetoworkspace, 3
bindd = $mainMod Shift, 4, $d mover al espacio 4, movetoworkspace, 4
bindd = $mainMod Shift, 5, $d mover al espacio 5, movetoworkspace, 5
bindd = $mainMod Shift, 6, $d mover al espacio 6, movetoworkspace, 6
bindd = $mainMod Shift, 7, $d mover al espacio 7, movetoworkspace, 7
bindd = $mainMod Shift, 8, $d mover al espacio 8, movetoworkspace, 8
bindd = $mainMod Shift, 9, $d mover al espacio 9, movetoworkspace, 9
bindd = $mainMod Shift, 0, $d mover al espacio 10, movetoworkspace, 10

# Mover la ventana enfocada a un espacio de trabajo relativo
$d=[$ws]
# Mueve la ventana actual al espacio de trabajo relativo siguiente/anterior.
bindd = $mainMod Control+Alt, Right, $d mover ventana al espacio relativo siguiente, movetoworkspace, r+1
bindd = $mainMod Control+Alt, Left, $d mover ventana al espacio relativo anterior, movetoworkspace, r-1

# Desplazarse por los espacios de trabajo existentes
$d=[$ws|Navigation]
# Te permite cambiar de espacio de trabajo girando la rueda del ratГіn hacia arriba o abajo mientras presionas Modificadora.
bindd = $mainMod, mouse_down, $d espacio siguiente, workspace, e+1
bindd = $mainMod, mouse_up, $d espacio anterior, workspace, e-1

# Mover/Cambiar al espacio de trabajo especial (scratchpad)
$d=[$ws|Navigation|Special workspace]
# Mueve la ventana actual al "Scratchpad" (un espacio de trabajo oculto) y la oculta.
bindd = $mainMod Shift, S, $d mover al scratchpad, movetoworkspace, special
# Mueve la ventana al Scratchpad de forma silenciosa (no te saca de tu vista actual).
bindd = $mainMod Alt, S, $d mover al scratchpad (silencioso), movetoworkspacesilent, special
# Muestra u oculta todas las ventanas que enviaste al Scratchpad.
bindd = $mainMod, S, $d alternar scratchpad,  togglespecialworkspace

# Mover la ventana enfocada a un espacio de trabajo silenciosamente
$d=[$ws|Navigation|Move window silently]
# Mueve la ventana actual a un espacio del 1 al 10 PERO te deja en el espacio donde estГЎs (modo silencioso).
bindd = $mainMod Alt, 1, $d mover al espacio 1 (silencioso), movetoworkspacesilent, 1
bindd = $mainMod Alt, 2, $d mover al espacio 2 (silencioso), movetoworkspacesilent, 2
bindd = $mainMod Alt, 3, $d mover al espacio 3 (silencioso), movetoworkspacesilent, 3
bindd = $mainMod Alt, 4, $d mover al espacio 4 (silencioso), movetoworkspacesilent, 4
bindd = $mainMod Alt, 5, $d mover al espacio 5 (silencioso), movetoworkspacesilent, 5
bindd = $mainMod Alt, 6, $d mover al espacio 6 (silencioso), movetoworkspacesilent, 6
bindd = $mainMod Alt, 7, $d mover al espacio 7 (silencioso), movetoworkspacesilent, 7
bindd = $mainMod Alt, 8, $d mover al espacio 8 (silencioso), movetoworkspacesilent, 8
bindd = $mainMod Alt, 9, $d mover al espacio 9 (silencioso), movetoworkspacesilent, 9
bindd = $mainMod Alt, 0, $d mover al espacio 10 (silencioso), movetoworkspacesilent, 10

$d=#! desestablecer el nombre del grupo